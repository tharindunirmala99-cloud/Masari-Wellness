name: Deploy to Netlify

on:
  push:
    branches: [ main ]
  workflow_run:
    workflows: [ "CI Pipeline" ]
    types: [ completed ]
    branches: [ main ]

jobs:
  deploy:
    name: Deploy to Netlify
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.workflow_run.conclusion ==
      'success'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          NODE_ENV: production

      - name: Deploy to Netlify
        uses: nwtour/gatsby-cli-github-action@v4.0.0
        with:
          deploy-flags: "--prod"
          netlify-token: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          netlify-site-id: ${{ secrets.NETLIFY_SITE_ID }}
        env:
          NODE_ENV: production

      - name: Notify deployment
        if: success()
        run: echo "✅ Successfully deployed to Netlify"

      - name: Deployment failed
        if: failure()
        run: echo "❌ Deployment to Netlify failed"

  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse audit
        uses: treosh/lighthouse-ci-action@v10
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true
